stages:
  - validate
  - test

variables:
  CONFIG_PATH: "config.json"

postman:validate:
  stage: validate
  image: node:18-alpine
  script:
    - npm install -g postman-cli
    - npm install -g @suban5/postman-parallel-runner@latest
    - postman-parallel --validate "$CONFIG_PATH"

postman:test:
  stage: test
  image: node:18-alpine
  script:
    - npm install -g postman-cli
    - npm install -g @suban5/postman-parallel-runner@latest
    - OUTPUT_DIR=$(node -e "const fs=require('fs'); const p=process.env.CONFIG_PATH||'config.json'; const cfg=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write((cfg.exportResultsFolder||'./results').replace(/\\/g,'/'));")
    - if [ -z "$OUTPUT_DIR" ]; then echo "Resolved output folder is empty. Aborting."; exit 1; fi
    - echo "Cleaning output folder: $OUTPUT_DIR"
    - rm -rf "$OUTPUT_DIR"
    - mkdir -p "$OUTPUT_DIR"
    - postman-parallel --config "$CONFIG_PATH"
    - echo "Artifact source: $OUTPUT_DIR"
    - mkdir -p ci-artifacts
    - if [ -d "$OUTPUT_DIR" ]; then cp -R "$OUTPUT_DIR"/. ci-artifacts/; fi
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - ci-artifacts/
