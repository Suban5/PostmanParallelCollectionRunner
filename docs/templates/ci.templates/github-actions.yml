name: Postman Parallel Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  postman-tests:
    runs-on: ubuntu-latest
    env:
      CONFIG_PATH: config.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Postman CLI + Runner
        run: |
          npm install -g postman-cli
          npm install -g @suban5/postman-parallel-runner@latest

      - name: Validate configuration
        run: postman-parallel --validate "$CONFIG_PATH"

      - name: Cleanup previous output folder
        run: |
          OUTPUT_DIR=$(node -e "const fs=require('fs'); const p=process.env.CONFIG_PATH||'config.json'; const cfg=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write((cfg.exportResultsFolder||'./results').replace(/\\/g,'/'));")
          if [ -z "$OUTPUT_DIR" ]; then
            echo "Resolved output folder is empty. Aborting."
            exit 1
          fi
          echo "Cleaning output folder: $OUTPUT_DIR"
          rm -rf "$OUTPUT_DIR"
          mkdir -p "$OUTPUT_DIR"

      - name: Run collections
        run: postman-parallel --config "$CONFIG_PATH"

      - name: Resolve artifact path from config
        id: resolve_output
        run: |
          OUTPUT_DIR=$(node -e "const fs=require('fs'); const p=process.env.CONFIG_PATH||'config.json'; const cfg=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write((cfg.exportResultsFolder||'./results').replace(/\\/g,'/'));")
          echo "dir=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"
          echo "Artifact source: $OUTPUT_DIR"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-results
          path: ${{ steps.resolve_output.outputs.dir }}/**
          if-no-files-found: ignore
