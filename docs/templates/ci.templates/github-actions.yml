name: Postman Parallel Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  postman-tests:
    runs-on: ubuntu-latest
    env:
      CONFIG_PATH: config.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Postman CLI + Runner
        run: |
          npm install -g postman-cli
          npm install -g @suban5/postman-parallel-runner

      - name: Validate configuration
        run: postman-parallel --validate "$CONFIG_PATH"

      - name: Run collections
        run: postman-parallel --config "$CONFIG_PATH"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-results
          path: results/**
          if-no-files-found: ignore
