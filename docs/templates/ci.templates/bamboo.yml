---
version: 2

plan:
  project-key: PPR
  key: TEST
  name: Postman Parallel Tests

variables:
  CONFIG_PATH: config.json

stages:
  - Validate and Run:
      jobs:
        - Run Postman Parallel

Run Postman Parallel:
  tasks:
    - checkout:
        force-clean-build: true

    - script:
        interpreter: SHELL
        scripts:
          - npm install -g postman-cli
          - npm install -g @suban5/postman-parallel-runner@latest
          - postman-parallel --validate "${bamboo.CONFIG_PATH}"
          - postman-parallel --config "${bamboo.CONFIG_PATH}"
          - OUTPUT_DIR=$(node -e "const fs=require('fs'); const p=process.env.CONFIG_PATH||'config.json'; const cfg=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write((cfg.exportResultsFolder||'./results').replaceAll('\\\\','/'));")
          - echo "Artifact source: $OUTPUT_DIR"
          - mkdir -p ci-artifacts
          - if [ -d "$OUTPUT_DIR" ]; then cp -R "$OUTPUT_DIR"/. ci-artifacts/; fi

  artifacts:
    - name: postman-results
      location: ci-artifacts
      pattern: "**/*"
      shared: true
      required: false
